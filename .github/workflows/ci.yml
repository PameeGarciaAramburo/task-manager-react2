name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./task-manager-react-pam-main/task-manager-react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: task-manager-react-pam-main/task-manager-react/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    defaults:
      run:
        working-directory: ./task-manager-react-pam-main/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: task-manager-react-pam-main/backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm run lint

      - run: npm run build