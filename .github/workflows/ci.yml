name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      working-directory: ./task-manager-react-pam-main/task-manager-react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-manager-react-pam-main/task-manager-react/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build