version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres-taskmanager
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/task_manager

  frontend:
    build: ./task-manager-react
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: